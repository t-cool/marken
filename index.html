<body>
    <div class="container">

        <!-- 英文の貼り付け場所 -->
        <textarea id="originalTxt">These are short, famous texts in English from classic sources like the Bible or Shakespeare. Some texts have word definitions and explanations to help you. Some of these texts are written in an old style of English. Try to understand them, because the English that we speak today is based on what our great, great, great, great grandparents spoke before! Of course, not all these texts were originally written in English. The Bible, for example, is a translation. But they are all well known in English today, and many of them express beautiful thoughts.

(Cited from https://www.englishclub.com/reading/classic-reading.htm)</textarea>

        <!-- ボタン -->
        <button id="btn">START</button>

        <!-- 注釈 -->
        <p><span id="afterClick">START をクリック後、</span>テキストを選択して以下のキーを押すと、<br>要素に記号をつけることができます</p>
        <p>A : 誰が　　S : する(です)　 D : だれ・なに<br>F : どこ、どう、いつ、なぜ　 Z : 玉手箱</p>
        

        <!-- 記号をつける場所 -->
        <div id="english">
        </div>
