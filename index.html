<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>意味順</title>
<style type="text/css">
.container{
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  padding-left:100px;
  padding-right:100px;
}

#originalTxt{
  display:inline-block;
  overflow-wrap: anywhere;
  width:80%;
  height: 300px;
}

#btn{
  display:inline-block;
  width: 80%;
  height: 50px;
  font-size: 20px;
}

#english{
  display: block;
  /* 行間 */
  line-height: 350%;
  /* 文字の大きさ */
  font-size: 1.5em;
  /* 文字折り返し */
  overflow-wrap: normal;
}

/* ルビ機能 (課題) 内包する要素の文字選択ができない */
[data-ruby] {
    position: relative;
}

[data-ruby]::before {
    content: attr(data-ruby);
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    font-size: 10px;
}

.tooltip {
  height: 0px;
}

/* tooltip の位置 */
.tooltip .tooltiptext {
  visibility: hidden;
  color: #fff;
  text-align: center;
  position: absolute;
  z-index: 1;
  top: 120%;
  left: 0;
  margin-left: 18px;
  border-radius: 6px;

}

.tooltip .tooltiptext {
  visibility: visible;
}

.hint{
  resize: none;
  width: 100px;
  height: 20px;
  font-size: 13px;
  border: 1px solid gainsboro;
}
</style>
</head>

<body>
    <div class="container">
        <!-- 英文の貼り付け場所 -->
        <textarea id="originalTxt">These are short, famous texts in English from classic sources like the Bible or Shakespeare. Some texts have word definitions and explanations to help you. Some of these texts are written in an old style of English. </textarea>

        <!-- ボタン -->
        <button id="btn">START</button>

        <!-- 注釈 -->
        <div id="afterClick" style="display: flex;width:100%;margin-left:25%;margin-top: 10px;margin-bottom: 10px;">
        </div>
        <!--
        <div id="signs" style="display: flex;border: solid 1px black;padding: 5px;margin-top: 10px;margin-bottom: 10px;">A : 誰が　　S : する(です)　 D : だれ・なに<br>F : どこ、どう、いつ、なぜ　 G : 形容詞句(節)　<br>Z : 玉手箱</div>
        -->

        <!-- 記号をつける場所 -->
        <div id="english"></div>  
        <button id="saveNotesBtn">Save Notes</button>
        <button id="restoreNotesBtn">Restore Notes</button>
        <div id="allNotesData" style="display: none;"></div>
        <div id="symbolNumber" style="display: none;"></div>
        <!--
        <input type="text" id="filename" name="name" required
       minlength="1" placeholder="ファイル名" maxlength="100" size="20">
        <button id="saveBtn">Save</button>
        -->

        <br>
    </div>

<script>
// ページに原文の貼り付けページがある場合
if(window.btn){
    // 原文を貼り付ける
    window.btn.addEventListener('click', function (event) {
    document.getElementById("afterClick").style.display = "none";
    marken.text = window.document.getElementById('originalTxt').value;
    removeElements();
    });
}

function Marken() {
  this.text = '';
  this.explanations = [];
  // this.undo_list = [];
  // this.redo_list = [];
  this.index = 0;
}

Marken.prototype.add = function (explanation) {
  this.explanations = this.explanations.slice(0, this.index + 1);
  this.explanations.push(explanation);
  this.index = this.explanations.length - 1;
  return explanation;
};

Marken.prototype.undo = function () {
  if (this.explanations.length > 0) {
    if (this.index > -1) {
      return this.explanations[this.index--];
    }
  }
};

Marken.prototype.redo = function () {
  if (this.explanations.length > 0) {
    if (this.index < this.explanations.length - 1) {
      return this.explanations[++this.index];
    }
  }
};

// ヒント関連
function Explanation() {
  this.range = null;
  this.instruction = null;
}

function Instruction(func, args, context) {
  this.fn = null;
}
Instruction.prototype.do = function(){}

let marken = new Marken();

// 履歴関連
let history = (function(){
  // プロパティ
  let currentSymbolNumber = 1;   // 直近のアクション番号
  let allActions = {};

  // 直近のアクション番号を取得
  function getCurrentSymbolNumber(){
    return currentSymbolNumber
  }

  // アクション番号を再設定する
  function setCurrentSymbolNumber(number){
    currentSymbolNumber = number;
  }

  function getPreviousSymbolNumber(){
    return currentSymbolNumber -1;
  }
  // アクション番号を inc する
  function increaseCurrentSymbolNumber(){
    currentSymbolNumber += 1;    
  }

  // アクション番号を dec する
  function decreaseCurrentSymbolNumber(){
    currentSymbolNumber -= 1;    
  }

  // 現在のアクションを allActions に追加する
  function addCurrentActionToAllActions(){
    allActions[`action${currentSymbolNumber}`] = null;
  }

  function addHintToAllActions(event){
    if (event.path[2].id == "" || event.path[2].id == undefined) return;

    allActions[event.path[2].id] = {hint: `${document.getElementById(`${event.path[0].id}`)?.value}`};
  }

  function getAllActions(){
    return allActions
  }

  return {
    getCurrentSymbolNumber: getCurrentSymbolNumber,
    setCurrentSymbolNumber: setCurrentSymbolNumber,
    increaseCurrentSymbolNumber: increaseCurrentSymbolNumber,
    decreaseCurrentSymbolNumber: decreaseCurrentSymbolNumber,
    getPreviousSymbolNumber: getPreviousSymbolNumber,

    addCurrentActionToAllActions: addCurrentActionToAllActions,
    addHintToAllActions: addHintToAllActions,
    getAllActions: getAllActions
  }
})();

// ページ内の要素を削除する
function removeElements(){
    window.document.getElementById('english').innerText = window.document.getElementById('originalTxt').value;
    window.document.getElementById('originalTxt').value = "";
    window.document.getElementById('btn').remove();
    window.document.getElementById('originalTxt').remove();
}

// つけた記号を削除する
function clear(){
    // 線記号の削除
    document.getElementById(`action${history.getPreviousSymbolNumber()}`).style = null;
    // 括弧記号 ( ) ＜ ＞ の削除
    document.getElementById(`action${history.getPreviousSymbolNumber()}`).innerHTML = 
    document.getElementById(`action${history.getPreviousSymbolNumber()}`).innerHTML.replace("＜","").replace("＞","").replace(" )","").replace("( ","").replace("⤺","");
    // ルビの消去
    document.getElementById(`action${history.getPreviousSymbolNumber()}`).removeAttribute("data-ruby");
    // id の消去
    document.getElementById(`action${history.getPreviousSymbolNumber()}`).removeAttribute("id");
    // 操作ラベルを 1 減らす
    history.decreaseCurrentSymbolNumber();
}

// 選択箇所の記号をクリアする
function clearSelected(range) {
  let newNode = document.createElement('span');
  newNode.setAttribute('style', '');
  newNode.innerHTML = range.toString().replace("＜", "").replace("＞", "").replace(" )", "").replace("( ", "").replace("⤺", "");
  range.deleteContents();
  range.insertNode(newNode);
  // 操作ラベルを 1 減らす
  history.decreaseCurrentSymbolNumber();
}

// 機能語の記号をつける
function alpha(range) {
  let newNode = document.createElement('span');
  newNode.setAttribute('data-ruby', history.getCurrentSymbolNumber());
  newNode.setAttribute('style', 'border: solid 1px black;background-color: #fff0e0');
  newNode.setAttribute('id', `action${history.getCurrentSymbolNumber()}`);
  // 半角スペース '&thinsp;'
  newNode.innerHTML = range.toString();
  range.deleteContents();
  range.insertNode(newNode);
  // 履歴に直近のアクションを追加
  history.addCurrentActionToAllActions();
  // 操作のタグ番号を更新する
  history.increaseCurrentSymbolNumber();
}

// 主語の記号をつける
function s(range) {
  let newNode = document.createElement('span');

  newNode.setAttribute('style', 'border-bottom:3px double black;padding-bottom:2px;');
//  newNode.setAttribute('class', 'actions');
  newNode.setAttribute('id', `action${history.getCurrentSymbolNumber()}`);

  // 番号をルビで実現する
  newNode.setAttribute('data-ruby', history.getCurrentSymbolNumber());

  newNode.innerHTML = range.toString();

  range.deleteContents();

  range.insertNode(newNode);

  // 履歴に直近の action を追加する
  history.addCurrentActionToAllActions();

  // 操作のタグ番号を更新する
  history.increaseCurrentSymbolNumber();
}

// 動詞の記号をつける
function v(range) {
  let newNode = document.createElement('span');
  newNode.setAttribute('style', 'border: solid 1px black;border-radius: 10px;');
  newNode.setAttribute('id', `action${history.getCurrentSymbolNumber()}`);
  newNode.setAttribute('data-ruby', history.getCurrentSymbolNumber());
  newNode.innerHTML = range.toString();
  range.deleteContents();
  range.insertNode(newNode);
  // 履歴に直近の action を追加
  history.addCurrentActionToAllActions();
  // 操作のタグ番号を更新する
  history.increaseCurrentSymbolNumber();
}

// 目的語(O)・補語(C)の記号をつける
function oc(range) {
  let newNode = document.createElement('span');
  newNode.setAttribute('style', 'border-bottom:1px solid black;padding-bottom:2px;');
  newNode.setAttribute('id', `action${history.getCurrentSymbolNumber()}`);
  newNode.setAttribute('data-ruby', history.getCurrentSymbolNumber());
  newNode.innerHTML = range.toString();
  range.deleteContents();
  range.insertNode(newNode);
  // 履歴に直近の action を追加する
  history.addCurrentActionToAllActions();
  // 操作のタグ番号を更新する
  history.increaseCurrentSymbolNumber();
}

// 副詞の記号をつける
function adv(range){
  let newNode = document.createElement('span');  
  newNode.setAttribute('data-ruby', `${history.getCurrentSymbolNumber()}`);
  newNode.setAttribute('id', `action${history.getCurrentSymbolNumber()}`);
  newNode.innerHTML = `＜${range.toString()}＞`;
  range.deleteContents();
  range.insertNode(newNode);
  // 履歴に直近の action を追加する
  history.addCurrentActionToAllActions();
  // 操作のタグ番号を更新する
  history.increaseCurrentSymbolNumber();
}

// 後置修飾の記号をつける
function adj(range) {
  let newNode = document.createElement('span');
  newNode.setAttribute('id', `action${history.getCurrentSymbolNumber()}`);
  newNode.setAttribute('data-ruby', history.getCurrentSymbolNumber());
  newNode.innerHTML = 
  `<span style="display:inline-block;transform:scale(1.5, 1);">⤺</span>( ${range.toString()} )`;
  range.deleteContents();
  range.insertNode(newNode);
  // 履歴に直近の action を追加する
  history.addCurrentActionToAllActions();
  // 操作のタグ番号を更新する
  history.increaseCurrentSymbolNumber();
}

// キー操作
document.addEventListener('keypress', (event) => {

  // 選択範囲をとる
  const selection = document.getSelection();
  const range = selection.getRangeAt(0);

  const explanation = new Explanation();
  explanation.range = range;

  // 選択範囲がないときは return
  if (range.toString() == '') return;
  // 記号付け
  let keyName = event.key;
  if (keyName == 'a') {
    explanation.instruction = s;
    s(range);
  } else if (keyName == 's') {
    explanation.instruction = v;
    v(range);
  } else if (keyName == 'd') {
    explanation.instruction = oc;
    oc(range);
  } else if (keyName == 'f') {
    explanation.instruction = adv;
    adv(range);
  } else if (keyName == 'g') {
    explanation.instruction = adj;
    adj(range);
  } else if (keyName == 'z') {
    explanation.instruction = alpha;
    alpha(range);
  } else if (keyName == 'c') {
    clearSelected(range);
  }
  marken.add(explanation);
});

document.addEventListener('keydown', (event) => {
  // Cmd(Ctrl)+z で直前の操作を取り消す
  if (event.key === 'z' && (event.ctrlKey || event.metaKey)) {
    const explanation = marken.undo();
    console.log(explanation);
    if (!!explanation) {
      clearSelected(explanation.range);
    }
  } else if (event.key === 'y' && (event.ctrlKey || event.metaKey)) {
    const explanation = marken.redo();
    console.log(explanation);
    if (!!explanation) {
      explanation.instruction(explanation.range);
    }
  }
});

// ドラッグ選択の操作
const element = document.getElementById("english");

element.addEventListener('selectstart', function () {

  element.addEventListener('mouseup', function (event) {
    // 半角スペースで始まるときは選択を打ち消す
    if (window.getSelection().toString().slice(0, 1) == " ") {
      window.getSelection().removeAllRanges();
    }

    // 選択が長すぎる場合は選択を取り消す
    if (window.getSelection().toString().length >= 80) {
      window.getSelection().removeAllRanges();
    }

    // 最後が半角スペースで始まるときは選択を打ち消す
    if (window.getSelection().toString().slice(-1) == " ") {
      console.log("!")
      window.getSelection().removeAllRanges();
    }
  });
});

// ダブルクリックした要素に input text でヒントを加える
document.addEventListener('dblclick', function(event){

  // 記号がないときは return
  if(event.target.id=="english") return;
  
  document.getElementById(`${event.target.id}`).setAttribute('class','tooltip actions');

  let newElement = document.createElement("span");

  let newContent = document.createTextNode("");
  newElement.innerHTML += `<textarea class="hint" id="${event.target.id}_hint">`;

  newElement.appendChild(newContent);
  newElement.setAttribute("class","tooltiptext");

  document.getElementById(`${event.target.id}`).appendChild(newElement);

  // 幅を取得
  let selectedText = document.getElementById(`${event.target.id}`);
  selectedLength = selectedText.innerText.length;

  document.getElementById(`${event.target.id}_hint`).style.width = `${selectedLength*10}px`;


  history.addHintToAllActions(event);

});

// 解説コメントの更新
window.addEventListener("keyup", function(event){
  history.addHintToAllActions(event);
});

if(window.saveBtn){
  // ページの保存機能
  saveBtn.addEventListener('click', function(evt) {

    // ファイル名
    let fileName = document.getElementById('filename').value + ".html";
    console.log(fileName);

    // 保存する内容
    let savedContent = document.getElementsByTagName('html')[0].innerHTML;
    console.log("<html>" + savedContent);

    evt.preventDefault();

    const blob = new Blob([savedContent], {type: 'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    document.body.appendChild(a);
    a.download = fileName;
    a.href = url;
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    console.log(savedContent);

  });
}

saveNotesBtn.addEventListener("click",function(){
  saveNotes(event);
})

let allNotesObj = {};
let allNotes;


// 注釈保存機能
function saveNotes(evt){

  allNotes =  document.getElementsByClassName('actions');

  for (let i = 0; i < allNotes.length; i++) {

    allNotesObj[allNotes[i].id] = allNotes[i].childNodes[1].childNodes[0].value;

    console.log(
    // action id
    allNotes[i].id, 
    // 注釈
    allNotes[i].childNodes[1].childNodes[0].value);
  }

  // action に紐づいた注釈を保存しておく
  let parent1 = document.getElementById('allNotesData');

  // 現在の注釈番号を記憶しておく
  let parent2 = document.getElementById('symbolNumber');

  let notes = JSON.stringify(allNotesObj);
  let currentSymbolNumber = history.getCurrentSymbolNumber();

  parent1.innerText = notes;
  parent2.innerText = currentSymbolNumber;

}

// 注釈復元機能
var allNotesArray = [];
restoreNotesBtn.addEventListener('click',function(){
    // allNotesObj に注釈のデータが入っている
    // {"action1":"2222","action3":"dddd"}
    allNotesObj = JSON.parse(document.getElementById('allNotesData').innerText)

    allNotesArray = Object.entries(allNotesObj);

    // コメントの action 番号
    for(i = 0; i < allNotesArray.length; i++){
      
      document.getElementById(allNotesArray[i][0]).childNodes[1].childNodes[0].value
      = allNotesArray[i][1];
    }
})

// 再編集する場合に action 番号を設定する
if(Number(document.getElementById('symbolNumber').innerText)){
  history.setCurrentSymbolNumber(Number(document.getElementById('symbolNumber').innerText));
}

</script>


</body>

</html>
